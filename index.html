<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>テスト3</title>
</head>
<body style="background:black;color:white;">
<p id="msg">開始</p>
<script>
try {
  const SK = "test";
  localStorage.setItem(SK, "ok");
  const v = localStorage.getItem(SK);
  document.getElementById('msg').textContent = 'localStorage: ' + v;
} catch(e) {
  document.getElementById('msg').textContent = 'エラー: ' + e.message;
}
</script>
</body>
</html>
