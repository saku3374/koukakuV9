<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>攻殻機動隊 実戦メモ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#07070f;color:#dde;font-family:'Courier New',monospace;padding-bottom:80px;}
button,input,textarea{font-family:'Courier New',monospace;-webkit-appearance:none;outline:none;}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ===== 定数 =====
const SK="kokaku_v12";
const KZ=[50,100,150,200,250,300,350,400,450,550];
const ZCOLS=["[緑]","[黄]","[赤]","[青]","[紫]","[虹]","[金]"];
const SCOLS=["[緑]","[赤]","[青]","[紫]","[虹]","[金]"];
const CZLV=["[青]","[緑]","[赤]","[虹]"];
const RARE=["なし","チェリー","スイカ","強役"];
const TACHI=[{k:"白",h:"平均35pt"},{k:"青",h:"平均50pt"},{k:"緑",h:"50pt以上 平均85pt"},{k:"赤",h:"100pt以上 平均130pt"}];
const MI={A:{c:"#6c757d",d:"天井550G",ceil:550},B:{c:"#0d6efd",d:"天井450G",ceil:450},C:{c:"#fd7e14",d:"天井250G*",ceil:250},D:{c:"#dc3545",d:"天井150G**",ceil:150}};
const ZT={50:{A:"25%",B:"50%",C:"25%",D:"100%"},100:{A:"50%",B:"1%",C:"50%",D:"1%"},150:{A:"1%",B:"50%",C:"1%",D:"天井"},200:{A:"家出",B:"家出",C:"家出",D:"-"},250:{A:"50%",B:"25%",C:"天井",D:"-"},300:{A:"-",B:"1%",C:"-",D:"-"},350:{A:"25%",B:"50%",C:"-",D:"-"},400:{A:"家出",B:"家出",C:"-",D:"-"},450:{A:"50%",B:"天井",C:"-",D:"-"},550:{A:"天井",B:"-",C:"-",D:"-"}};
const ICHI=[{k:"素子",h:"デフォルト",c:"#555"},{k:"戦闘中素子",h:"高設定示唆(弱)",c:"#198754"},{k:"トグサ",h:"奇数設定示唆",c:"#4da8ff"},{k:"バトー",h:"偶数設定示唆",c:"#4da8ff"},{k:"ポーカー",h:"高モード示唆",c:"#0dcaf0"},{k:"素子後ろ姿",h:"モードB以上濃厚",c:"#ffc107"},{k:"公安9課",h:"モードC以上濃厚",c:"#fd7e14"},{k:"電脳素子",h:"モードC以上+D期待",c:"#a855f7"},{k:"アオイ",h:"モードD+設定4以上",c:"#fbbf24"},{k:"2ndGIG",h:"白の境界 権利保有",c:"#22d3ee"}];
const FRAMES=[{k:"なし",c:"#444"},{k:"赤枠",c:"#dc3545"},{k:"紫枠",c:"#a855f7"},{k:"金枠",c:"#ffc107"}];
const TROPH=[{k:"なし",l:"なし",c:"#444"},{k:"銅",l:"銅(設定2以上)",c:"#cd7f32"},{k:"銀",l:"銀(設定3以上)",c:"#adb5bd"},{k:"金",l:"金(設定4以上)",c:"#ffc107"},{k:"キリン",l:"キリン(設定5以上)",c:"#fd7e14"},{k:"虹",l:"虹(設定6確定)",c:"#0dcaf0"}];
const SAM=[{k:"①",h:"デフォルト"},{k:"②",h:"復活期待50%"},{k:"③",h:"調査中"},{k:"④",h:"偶数アップ"},{k:"⑤",h:"高設定弱"},{k:"⑥",h:"高設定強"},{k:"⑦",h:"調査中"},{k:"⑧",h:"設定2以上"},{k:"⑨",h:"設定4以上"},{k:"⑩",h:"設定6濃厚"}];
const TBL=["①","②","③","④","⑤","⑥","⑦"];
const CYC=["①","②","③","④","⑤","⑥","⑦","⑧"];
const GRN="#00ff99",BG="#07070f",MUT="#556";

// ===== データ =====
let _id=0;
const uid=()=>++*id+”*”+Date.now();
function newAT(n){return{n,cycles:[newCyc()],mai:null,bmai:null,ichi:null,frame:“なし”,sam:null,trophy:“なし”,tachi:null,hakky:null,note:””};}
function newCyc(){var k={};KZ.forEach(function(g){k[g]={col:null,hat:null};});return{id:uid(),naibu:“通常”,conf:[],deny:[],tachi:null,kirei:k,sen:[],cz:null};}
function newSen(g,tr){return{id:uid(),g:g,tr:tr,tbl:null,col:null,ok:null,memo:””};}
function newCZ(g,type){return{id:uid(),g:g,type:type,lv:null,rare:“なし”,ok:null,fuk:null,sam:null};}

// ===== STATE =====
var S={scr:“home”,ats:[],curAT:null,curCyc:0,totalG:””,totalMai:””,senG:null,senTr:“規定G”,czG:null,openSec:null,openSen:null};

function save(){try{localStorage.setItem(SK,JSON.stringify({ats:S.ats,totalG:S.totalG,totalMai:S.totalMai}));}catch(e){}}
function load(){try{var d=JSON.parse(localStorage.getItem(SK)||”{}”);if(Array.isArray(d.ats))S.ats=d.ats;if(d.totalG)S.totalG=d.totalG;if(d.totalMai)S.totalMai=d.totalMai;}catch(e){}}
function getAT(){return S.curAT!==null?S.ats[S.curAT]:null;}
function getCyc(){var a=getAT();return a?a.cycles[S.curCyc]:null;}
function updAT(fn){var i=S.curAT;S.ats[i]=fn(S.ats[i]);save();}
function updCyc(fn){var a=getAT();if(!a)return;var cs=a.cycles.slice();cs[S.curCyc]=fn(cs[S.curCyc]);S.ats[S.curAT]=Object.assign({},a,{cycles:cs});save();}
function updSen(si,k,v){updCyc(function(c){var s=c.sen.slice();s[si]=Object.assign({},s[si]);s[si][k]=v;return Object.assign({},c,{sen:s});});}
function updCZ(k,v){updCyc(function(c){return Object.assign({},c,{cz:Object.assign({},c.cz)});});}
function modeState(m){var c=getCyc();if(!c)return”off”;return c.conf.indexOf(m)>=0?“on”:c.deny.indexOf(m)>=0?“deny”:“off”;}
function cycleMode(m){
updCyc(function(c){
if(c.conf.indexOf(m)<0&&c.deny.indexOf(m)<0)return Object.assign({},c,{conf:c.conf.concat([m])});
if(c.conf.indexOf(m)>=0)return Object.assign({},c,{conf:c.conf.filter(function(x){return x!==m;}),deny:c.deny.concat([m])});
return Object.assign({},c,{deny:c.deny.filter(function(x){return x!==m;})});
});
}

// ===== DOM =====
function el(tag,style,text){
var e=document.createElement(tag);
if(style)e.setAttribute(“style”,style);
if(text!==undefined&&text!==null)e.textContent=text;
return e;
}
function div(style,text){return el(“div”,style,text);}
function span(style,text){return el(“span”,style,text);}
function btn(style,text,fn){var e=el(“button”,style,text);if(fn)e.addEventListener(“click”,fn);return e;}
function ap(parent){var args=Array.prototype.slice.call(arguments,1);args.forEach(function(c){if(c)parent.appendChild(c);});return parent;}

function mkBtn(label,active,color,fn,sm){
var s=“background:”+(active?color+“33”:“transparent”)+”;color:”+(active?color:color+“88”)+”;border:1px solid “+(active?color:color+“33”)+”;border-radius:5px;padding:”+(sm?“3px 8px”:“5px 11px”)+”;font-size:”+(sm?“11px”:“12px”)+”;font-weight:”+(active?“700”:“400”)+”;cursor:pointer;”;
return btn(s,label,fn);
}
function mkTag(text,color,sm){
var s=“display:inline-block;background:”+color+“22;border:1px solid “+color+“44;color:”+color+”;border-radius:3px;padding:”+(sm?“1px 4px”:“2px 6px”)+”;font-size:”+(sm?“10px”:“11px”)+”;margin:1px;”;
return span(s,text);
}

// テンキー
function showNumpad(label,curVal,onDone){
var v=String(curVal||””);
var ov=div(“position:fixed;top:0;left:0;right:0;bottom:0;background:#000000aa;z-index:200;display:flex;align-items:flex-end;”);
var pad=div(“background:#0a0a18;border-top:2px solid #00ff9944;width:100%;padding:10px 12px 24px;”);
var top=div(“display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;”);
top.appendChild(span(“color:”+MUT+”;font-size:11px;”,label));
var disp=span(“color:”+GRN+”;font-size:22px;font-weight:700;min-width:60px;text-align:right;”,v||”-”);
top.appendChild(disp);
pad.appendChild(top);
var grid=div(“display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px;”);
[“7”,“8”,“9”,“4”,“5”,“6”,“1”,“2”,“3”,“C”,“0”,“BS”].forEach(function(k){
var isSpec=k===“BS”||k===“C”;
var b=btn(“background:”+(isSpec?”#1a1a2a”:”#111122”)+”;color:”+(k===“BS”?”#ff6666”:k===“C”?”#ff9944”:GRN)+”;border:1px solid “+(isSpec?”#333”:”#1e1e3a”)+”;border-radius:8px;padding:14px 0;font-size:18px;font-weight:700;”,k,function(){
if(k===“BS”)v=v.slice(0,-1);
else if(k===“C”)v=””;
else if(v.length<4)v+=k;
disp.textContent=v||”-”;
});
grid.appendChild(b);
});
pad.appendChild(grid);
var btns=div(“display:grid;grid-template-columns:1fr 1fr;gap:8px;”);
btns.appendChild(btn(“background:transparent;color:#556;border:1px solid #333;border-radius:8px;padding:12px;font-size:14px;”,“キャンセル”,function(){ov.remove();}));
btns.appendChild(btn(“background:”+GRN+”;color:”+BG+”;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:700;”,“確定”,function(){onDone(v?parseInt(v):null);ov.remove();render();}));
pad.appendChild(btns);
ov.appendChild(pad);
ov.addEventListener(“click”,function(e){if(e.target===ov)ov.remove();});
document.body.appendChild(ov);
}

function gBtn(val,placeholder,label,onChange){
var s=“background:#16162a;border:1px solid “+(val?”#444”:”#222235”)+”;border-radius:7px;color:”+(val?GRN:”#445”)+”;padding:8px 12px;font-size:”+(val?“16px”:“13px”)+”;font-weight:”+(val?“700”:“400”)+”;text-align:left;width:100%;display:block;”;
return btn(s,val?val+“G”:(placeholder||“G数入力”),function(){showNumpad(label||“G数”,val,function(v){onChange(v);});});
}

// カスタム確認
function showConfirm(msg,onOk){
var ov=div(“position:fixed;top:0;left:0;right:0;bottom:0;background:#000000aa;z-index:300;display:flex;align-items:center;justify-content:center;”);
var box=div(“background:#0e0e1a;border:1px solid #444;border-radius:12px;padding:20px 16px;margin:0 20px;max-width:320px;width:100%;”);
box.appendChild(div(“color:#dde;font-size:14px;margin-bottom:16px;line-height:1.6;”,msg));
var btns=div(“display:grid;grid-template-columns:1fr 1fr;gap:8px;”);
btns.appendChild(btn(“background:transparent;color:#aaa;border:1px solid #444;border-radius:8px;padding:11px;font-size:14px;”,“キャンセル”,function(){ov.remove();}));
btns.appendChild(btn(“background:#dc3545;color:#fff;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:700;”,“リセット”,function(){ov.remove();onOk();}));
box.appendChild(btns);
ov.appendChild(box);
document.body.appendChild(ov);
}

// セクション折りたたみ
function mkSection(id,label,color,badge,buildFn){
var isOpen=S.openSec===id;
var hdr=btn(“background:”+(isOpen?color+“18”:“transparent”)+”;color:”+(isOpen?color:color+“66”)+”;border:1px solid “+(isOpen?color+“44”:”#222”)+”;border-radius:”+(isOpen?“7px 7px 0 0”:“7px”)+”;padding:7px 12px;font-size:12px;font-weight:700;width:100%;text-align:left;display:flex;align-items:center;justify-content:space-between;margin-bottom:”+(isOpen?“0”:“2px”)+”;”,null,function(){S.openSec=S.openSec===id?null:id;render();});
var lbl=span(””,( isOpen?“v “:”>> “)+label);
hdr.appendChild(lbl);
if(badge)hdr.appendChild(span(“font-size:10px;opacity:0.7;”,badge));
var wrap=div(“margin-bottom:6px;”);
wrap.appendChild(hdr);
if(isOpen){
var body=div(“background:#16162a;border:1px solid #222;border-top:none;border-radius:0 0 7px 7px;padding:10px 10px 8px;”);
buildFn(body);
wrap.appendChild(body);
}
return wrap;
}

// レポート
function buildReport(){
var lines=[“スマスロ攻殻機動隊 実戦まとめ”,“総G数:”+S.totalG+“G / 差枚:”+S.totalMai+“枚”,””];
S.ats.forEach(function(a){
var prev=S.ats[a.n-2];
lines.push(“AT”+a.n+(prev&&prev.tachi?” 看板引継:”+prev.tachi:””));
a.cycles.forEach(function(c,ci){
var cn=CYC[ci]||String(ci+1);
lines.push(cn+c.naibu+(c.conf.length?” 確:”+c.conf.join(””):””)+(c.deny.length?” 否:”+c.deny.join(””):””)+(c.tachi?” 看板”+c.tachi:””));
var kp=[];KZ.forEach(function(g){var k=c.kirei[g];if(k.col||k.hat!==null)kp.push(g+(k.col||””)+(k.hat===true?“〇”:k.hat===false?”-”:””));});
if(kp.length)lines.push(” [”+kp.join(” “)+”]”);
c.sen.forEach(function(s){lines.push(” (”+s.g+“G 殲滅”+(s.tr===“ポイント”?“P”:””)+(s.tbl?” “+s.tbl:””)+(s.col||””)+(s.ok===true?“〇”:s.ok===false?“x”:”?”)+(s.memo?” “+s.memo:””)+”)”);});
if(c.cz){var cz=c.cz;lines.push(” “+cz.g+“G CZ[”+cz.type+”] “+(cz.lv||”?”)+(cz.rare!==“なし”?” “+cz.rare:””)+(cz.ok===true?“〇”:cz.ok===false?“x”:”?”)+(cz.fuk===true?” 復活〇”:cz.fuk===false?” 復活x”:””)+(cz.sam?” 画面”+cz.sam:””));}
});
lines.push(” -> “+(a.mai?a.mai+“枚”:””)+(a.bmai?” (+”+a.bmai+”)”:””)+(a.ichi?” “+a.ichi+(a.frame!==“なし”?a.frame:””):””)+(a.sam?” 画面”+a.sam:””)+(a.trophy!==“なし”?” “+a.trophy:””)+(a.hakky?” 白の境界Lv”+a.hakky:””)+(a.tachi?” “+a.tachi:””));
if(a.note)lines.push(” “+a.note);
lines.push(””);
});
return lines.join(”\n”);
}

// ===== RENDER =====
function render(){
var root=document.getElementById(“root”);
root.innerHTML=””;
if(S.scr===“home”)renderHome(root);
else if(S.scr===“record”)renderRecord(root);
else if(S.scr===“summary”)renderSummary(root);
}

// ===== HOME =====
function renderHome(root){
var hdr=div(“background:#0e0e1a;border-bottom:1px solid #00ff9922;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;”);
hdr.appendChild(span(“color:”+GRN+”;font-size:12px;font-weight:700;letter-spacing:3px;”,“攻殻機動隊 実戦メモ”));
hdr.appendChild(mkTag(S.ats.length+“AT”,GRN,true));
root.appendChild(hdr);
var wrap=div(“padding:10px 12px;”);

// セッション
var sc=div(“background:#0e0e1a;border:1px solid #222235;border-radius:10px;padding:10px 12px;margin-bottom:8px;”);
sc.appendChild(span(“font-size:9px;color:”+GRN+”;letter-spacing:3px;text-transform:uppercase;margin-bottom:6px;font-weight:700;display:block;”,“セッション”));
var stats=div(“display:flex;gap:8px;margin-bottom:10px;”);
var senCount=S.ats.reduce(function(a,r){return a+r.cycles.reduce(function(b,c){return b+c.sen.length;},0);},0);
var trCount=S.ats.filter(function(r){return r.trophy!==“なし”;}).length;
[{v:S.ats.length,l:“AT”,c:GRN},{v:senCount,l:“殲滅”,c:”#ffc107”},{v:trCount,l:“トロフィー”,c:”#a855f7”}].forEach(function(x){
var box=div(“flex:1;text-align:center;”);
box.appendChild(div(“font-size:24px;font-weight:700;color:”+x.c+”;”,String(x.v)));
box.appendChild(div(“font-size:9px;color:”+MUT+”;letter-spacing:1px;”,x.l));
stats.appendChild(box);
});
sc.appendChild(stats);
var gRow=div(“display:flex;gap:6px;”);
[{v:S.totalG,p:“総G数”,k:“totalG”},{v:S.totalMai,p:“総差枚”,k:“totalMai”}].forEach(function(x){
var box=div(“flex:1;”);
box.appendChild(span(“font-size:10px;color:”+MUT+”;margin-bottom:2px;display:block;”,x.p));
var gb=gBtn(x.v?parseInt(x.v):null,x.p,x.p,function(val){S[x.k]=val?String(val):””;save();});
gb.style.width=“100%”;
box.appendChild(gb);
gRow.appendChild(box);
});
sc.appendChild(gRow);
wrap.appendChild(sc);

// AT一覧
S.ats.forEach(function(a,i){
var prev=S.ats[i-1];
var inheritTachi=prev?prev.tachi:null;
var ichiInfo=null;ICHI.forEach(function(e){if(e.k===a.ichi)ichiInfo=e;});
var trInfo=null;TROPH.forEach(function(t){if(t.k===a.trophy)trInfo=t;});
var card=div(“background:#0e0e1a;border:1px solid “+(S.curAT===i?GRN+“44”:”#222235”)+”;border-radius:10px;padding:10px 12px;margin-bottom:8px;cursor:pointer;”);
card.addEventListener(“click”,function(){S.curAT=i;S.curCyc=a.cycles.length-1;S.scr=“record”;S.openSec=null;S.openSen=null;render();});
var top=div(“display:flex;align-items:center;gap:6px;margin-bottom:4px;”);
top.appendChild(span(“color:”+GRN+”;font-weight:700;font-size:14px;”,“AT”+a.n));
if(inheritTachi)top.appendChild(mkTag(“看板:”+inheritTachi,”#0dcaf0”,true));
if(a.mai){var ms=span(“color:#0dcaf0;font-weight:700;margin-left:auto;”,a.mai+“枚”+(a.bmai?” (+”+a.bmai+”)”:””));top.appendChild(ms);}
if(a.trophy!==“なし”&&trInfo)top.appendChild(mkTag(a.trophy,trInfo.c,true));
card.appendChild(top);
var cycDiv=div(“font-size:10px;color:#556;line-height:1.9;”);
a.cycles.forEach(function(c,ci){
var czOk=c.cz?c.cz.ok:null;
var row=div(“padding-left:4px;border-left:2px solid “+(czOk===true?”#00ff9944”:czOk===false?”#ff444433”:”#333”)+”;”);
var txt=(CYC[ci]||String(ci+1))+” “+c.naibu;
if(c.tachi)txt+=” 看板”+c.tachi;
c.conf.forEach(function(m){txt+=” 確”+m;});
c.sen.forEach(function(s){txt+=” “+s.g+“G”+(s.col||””)+(s.ok===true?“〇”:s.ok===false?“x”:””);});
if(c.cz)txt+=” CZ”+(c.cz.lv||””)+(c.cz.ok===true?“〇”:c.cz.ok===false?“x”:””);
row.textContent=txt;
cycDiv.appendChild(row);
});
card.appendChild(cycDiv);
if(a.ichi&&ichiInfo){var id2=div(“margin-top:4px;”);id2.appendChild(mkTag(a.ichi,ichiInfo.c,true));card.appendChild(id2);}
wrap.appendChild(card);
});

wrap.appendChild(btn(“background:”+GRN+”;color:”+BG+”;border:none;border-radius:9px;padding:12px;font-size:14px;font-weight:700;width:100%;margin-bottom:6px;”,”+ 新しいATを開始”,function(){
var idx=S.ats.length;S.ats.push(newAT(idx+1));S.curAT=idx;S.curCyc=0;S.scr=“record”;S.openSec=null;S.openSen=null;save();render();
}));
wrap.appendChild(btn(“background:transparent;color:#aaa;border:1px solid #333;border-radius:9px;padding:12px;font-size:14px;font-weight:700;width:100%;margin-bottom:6px;”,“設定判別サマリー”,function(){S.scr=“summary”;render();}));
wrap.appendChild(btn(“background:transparent;color:#dc3545;border:1px solid #dc354533;border-radius:9px;padding:12px;font-size:14px;font-weight:700;width:100%;margin-bottom:6px;”,“リセット”,function(){
showConfirm(“全データをリセットしますか？”,function(){S.ats=[];S.totalG=””;S.totalMai=””;try{localStorage.removeItem(SK);}catch(e){}render();});
}));

// カンペ
var kp=div(“background:#0e0e1a;border:1px solid #222235;border-radius:10px;padding:10px 12px;margin-top:8px;”);
kp.appendChild(span(“font-size:9px;color:”+GRN+”;letter-spacing:3px;text-transform:uppercase;margin-bottom:6px;font-weight:700;display:block;”,“一枚絵カンペ”));
ICHI.filter(function(e){return e.c!==”#555”;}).forEach(function(e){
var row=div(“display:flex;align-items:center;gap:6px;margin-bottom:4px;”);
row.appendChild(mkTag(e.k,e.c,true));
row.appendChild(span(“font-size:11px;color:#aaa;”,” -> “+e.h));
kp.appendChild(row);
});
var td=div(“margin-top:6px;border-top:1px solid #222235;padding-top:6px;”);
td.appendChild(span(“font-size:9px;color:”+GRN+”;letter-spacing:2px;margin-bottom:4px;display:block;”,“タチコマ看板（CZ前兆/CZ終了/AT終了時）”));
TACHI.forEach(function(t){
var row=div(“display:flex;align-items:center;gap:6px;margin-bottom:3px;”);
row.appendChild(span(“font-size:14px;font-weight:700;color:#0dcaf0;”,”[”+t.k+”]”));
row.appendChild(span(“font-size:11px;color:#aaa;”,” -> “+t.h));
td.appendChild(row);
});
kp.appendChild(td);
wrap.appendChild(kp);

FRAMES.forEach(function(f){fr2.appendChild(mkBtn(f.k,at.frame===f.k,f.c,function(){updAT(function(a){return Object.assign({},a,{frame:f.k});});render();},true));});
body.appendChild(fr2);
}
body.appendChild(span(“font-size:10px;color:”+MUT+”;margin-bottom:2px;display:block;”,“SAM終了画面（AT中）”));
var sr2=div(“display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px;”);
SAM.forEach(function(s){sr2.appendChild(mkBtn(s.k,at.sam===s.k,”#667”,function(){updAT(function(a){return Object.assign({},a,{sam:a.sam===s.k?null:s.k});});render();},true));});
body.appendChild(sr2);
body.appendChild(span(“font-size:10px;color:”+MUT+”;margin-bottom:2px;display:block;”,“トロフィー”));
var tr2=div(“display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px;”);
TROPH.forEach(function(t){tr2.appendChild(mkBtn(t.l,at.trophy===t.k,t.c,function(){updAT(function(a){return Object.assign({},a,{trophy:t.k});});render();},true));});
body.appendChild(tr2);
body.appendChild(span(“font-size:10px;color:”+MUT+”;margin-bottom:2px;display:block;”,“白の境界 Lv”));
var hr=div(“display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px;”);
[“1”,“2”,“3”].forEach(function(lv){hr.appendChild(mkBtn(“Lv”+lv,at.hakky===lv,”#0dcaf0”,function(){updAT(function(a){return Object.assign({},a,{hakky:a.hakky===lv?null:lv});});render();},true));});
body.appendChild(hr);
var td2=div(“border-top:1px solid #222235;padding-top:8px;margin-top:4px;”);
td2.appendChild(span(“font-size:10px;color:#fbbf24;margin-bottom:4px;display:block;”,“AT終了後 タチコマ看板色（次ATへの示唆）”));
var tbRow=div(“display:flex;gap:4px;flex-wrap:wrap;margin-bottom:4px;”);
TACHI.forEach(function(t){
var active=at.tachi===t.k;
tbRow.appendChild(btn(“background:”+(active?”#ffffff22”:“transparent”)+”;border:1px solid “+(active?”#fbbf24”:”#333”)+”;border-radius:5px;padding:4px 12px;font-size:13px;font-weight:700;color:”+(active?”#fbbf24”:”#445”)+”;”,”[”+t.k+”]”,function(){updAT(function(a){return Object.assign({},a,{tachi:a.tachi===t.k?null:t.k});});render();}));
});
td2.appendChild(tbRow);
if(at.tachi){var th3=null;TACHI.forEach(function(t){if(t.k===at.tachi)th3=t;});if(th3)td2.appendChild(div(“font-size:10px;color:#fbbf24;”,th3.h));}
body.appendChild(td2);
var ta=document.createElement(“textarea”);
ta.setAttribute(“style”,“background:#070710;border:1px solid #333;border-radius:6px;color:#bbb;padding:6px 8px;font-size:12px;width:100%;min-height:50px;resize:vertical;margin-top:8px;”);
ta.placeholder=“s9m / 白の境界詳細 / その他”;ta.value=at.note||””;
ta.addEventListener(“input”,function(e){updAT(function(a){return Object.assign({},a,{note:e.target.value});});});
body.appendChild(ta);
}));

var bRow=div(“display:flex;gap:6px;margin-top:8px;”);
bRow.appendChild(btn(“flex:1;background:transparent;color:#ff6666;border:1px solid #dc354544;border-radius:9px;padding:12px;font-size:14px;font-weight:700;”,“CZ失敗->次周期”,function(){
updCyc(function(c){return Object.assign({},c,{cz:c.cz?Object.assign({},c.cz,{ok:false}):c.cz});});
var a2=getAT();S.ats[S.curAT]=Object.assign({},a2,{cycles:a2.cycles.concat([newCyc()])});
S.curCyc++;S.senG=null;S.czG=null;S.openSec=null;S.openSen=null;save();render();
}));
bRow.appendChild(btn(“flex:1;background:transparent;color:#aaa;border:1px solid #333;border-radius:9px;padding:12px;font-size:14px;font-weight:700;”,”+ 次のAT”,function(){
var idx=S.ats.length;S.ats.push(newAT(idx+1));S.curAT=idx;S.curCyc=0;S.scr=“record”;S.openSec=null;S.openSen=null;save();render();
}));
wrap.appendChild(bRow);
wrap.appendChild(btn(“background:”+GRN+”;color:”+BG+”;border:none;border-radius:9px;padding:12px;font-size:14px;font-weight:700;width:100%;margin-top:6px;”,”<- ホームへ”,function(){S.scr=“home”;render();}));
root.appendChild(wrap);
}

// ===== SUMMARY =====
function renderSummary(root){
var ats=S.ats;
var imeC={},trC={};var czOk=0,czNg=0,fukOk=0,fukNg=0;
ats.forEach(function(a){
if(a.ichi)imeC[a.ichi]=(imeC[a.ichi]||0)+1;
trC[a.trophy]=(trC[a.trophy]||0)+1;
a.cycles.forEach(function(c){if(c.cz){if(c.cz.ok===true)czOk++;if(c.cz.ok===false){czNg++;if(c.cz.fuk===true)fukOk++;if(c.cz.fuk===false)fukNg++;}}});
});
var hdr=div(“background:#0e0e1a;border-bottom:1px solid #00ff9922;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;”);
hdr.appendChild(btn(“background:none;border:none;color:”+GRN+”;font-size:18px;padding:0 4px;”,”<-”,function(){S.scr=“home”;render();}));
hdr.appendChild(span(“color:”+GRN+”;font-weight:700;font-size:12px;letter-spacing:2px;”,“設定判別サマリー”));
hdr.appendChild(mkTag(“AT”+ats.length,GRN,true));
root.appendChild(hdr);
var wrap=div(“padding:10px 12px;”);

var cs=div(“background:#0e0e1a;border:1px solid #222235;border-radius:10px;padding:10px 12px;margin-bottom:8px;”);
cs.appendChild(span(“font-size:9px;color:”+GRN+”;letter-spacing:3px;text-transform:uppercase;margin-bottom:6px;font-weight:700;display:block;”,“CZ成績”));
var czRow=div(“display:flex;gap:16px;font-size:18px;font-weight:700;margin-bottom:4px;”);
czRow.appendChild(span(“color:#00ff99;”,“OK “+czOk+“回”));czRow.appendChild(span(“color:#ff4444;”,“NG “+czNg+“回”));
if((czOk+czNg)>0)czRow.appendChild(span(“color:”+MUT+”;font-size:13px;font-weight:400;”,“成功率”+Math.round(czOk/(czOk+czNg)*100)+”%”));
cs.appendChild(czRow);
if((fukOk+fukNg)>0)cs.appendChild(div(“font-size:12px;color:#aaa;”,“復活: “+fukOk+“OK / “+fukNg+“NG (”+Math.round(fukOk/(fukOk+fukNg)*100)+”%)”));
wrap.appendChild(cs);

var ic=div(“background:#0e0e1a;border:1px solid #222235;border-radius:10px;padding:10px 12px;margin-bottom:8px;”);
ic.appendChild(span(“font-size:9px;color:”+GRN+”;letter-spacing:3px;text-transform:uppercase;margin-bottom:6px;font-weight:700;display:block;”,“一枚絵分布”));
if(!Object.keys(imeC).length){ic.appendChild(div(“color:”+MUT+”;font-size:11px;”,“記録なし”));}
else{Object.keys(imeC).forEach(function(k){
var cnt=imeC[k];var info=null;ICHI.forEach(function(e){if(e.k===k)info=e;});var c=info?info.c:”#888”;
var row=div(“display:flex;align-items:center;gap:8px;margin-bottom:5px;”);
row.appendChild(span(“min-width:78px;font-size:11px;color:”+c+”;font-weight:700;”,k));
var bar=div(“flex:1;background:#1a1a2a;border-radius:3px;height:6px;”);
var fill=div(“background:”+c+”;width:”+Math.round(cnt/ats.length*100)+”%;height:100%;border-radius:3px;”);
bar.appendChild(fill);row.appendChild(bar);
row.appendChild(span(“color:#aaa;font-size:11px;min-width:36px;”,cnt+”/”+ats.length));
ic.appendChild(row);
});}
wrap.appendChild(ic);

var tc=div(“background:#0e0e1a;border:1px solid #222235;border-radius:10px;padding:10px 12px;margin-bottom:8px;”);
tc.appendChild(span(“font-size:9px;color:”+GRN+”;letter-spacing:3px;text-transform:uppercase;margin-bottom:6px;font-weight:700;display:block;”,“トロフィー”));
var validTr=Object.keys(trC).filter(function(k){return k!==“なし”;});
if(!validTr.length){tc.appendChild(div(“color:”+MUT+”;font-size:11px;”,“なし”));}
else{validTr.forEach(function(k){var t=null;TROPH.forEach(function(x){if(x.k===k)t=x;});var d3=div(“margin-bottom:4px;”);d3.appendChild(mkTag((t?t.l:k)+” x”+trC[k],t?t.c:”#888”,false));tc.appendChild(d3);});}
wrap.appendChild(tc);

var sc2=div(“background:#0e0e1a;border:1px solid #222235;border-radius:10px;padding:10px 12px;margin-bottom:8px;”);
sc2.appendChild(span(“font-size:9px;color:”+GRN+”;letter-spacing:3px;text-transform:uppercase;margin-bottom:6px;font-weight:700;display:block;”,“設定推測”));
var hints=[];
if((trC[“虹”]||0)>0)hints.push({c:”#0dcaf0”,t:“虹 -> 設定6確定！”});
if((trC[“キリン”]||0)>0)hints.push({c:”#fd7e14”,t:“キリン -> 設定5以上確定”});
if((trC[“金”]||0)>=2)hints.push({c:”#ffc107”,t:“金x”+(trC[“金”]||0)+” -> 設定4以上濃厚”});
if((imeC[“アオイ”]||0)>0)hints.push({c:”#fbbf24”,t:“アオイ”+(imeC[“アオイ”]||0)+“回 -> モードD+設定4以上”});
if(!hints.length)hints.push({c:”#334”,t:“サンプル不足。記録を続けましょう。”});
hints.forEach(function(x){sc2.appendChild(div(“font-size:12px;color:”+x.c+”;margin-bottom:5px;”,”* “+x.t));});
wrap.appendChild(sc2);

var rc=div(“background:#0e0e1a;border:1px solid #222235;border-radius:10px;padding:10px 12px;margin-bottom:8px;”);
rc.appendChild(span(“font-size:9px;color:”+GRN+”;letter-spacing:3px;text-transform:uppercase;margin-bottom:6px;font-weight:700;display:block;”,“実戦レポート”));
var pre=document.createElement(“pre”);
pre.setAttribute(“style”,“background:#050508;border:1px solid #222235;border-radius:7px;padding:10px;font-size:10px;color:#0f0;white-space:pre-wrap;line-height:1.8;max-height:320px;overflow:auto;margin:0;”);
pre.textContent=buildReport();
rc.appendChild(pre);
var copyBtn=btn(“background:transparent;color:”+GRN+”;border:1px solid #00ff9944;border-radius:7px;padding:8px 12px;font-size:12px;font-weight:700;width:100%;margin-top:6px;”,“レポートをコピー”,function(){
var text=buildReport();
function fallback(){var ta=document.createElement(“textarea”);ta.value=text;ta.style.position=“fixed”;ta.style.opacity=“0”;document.body.appendChild(ta);ta.select();ta.setSelectionRange(0,99999);try{document.execCommand(“copy”);copyBtn.textContent=“コピーしました”;setTimeout(function(){copyBtn.textContent=“レポートをコピー”;},1500);}catch(e){copyBtn.textContent=“失敗”;}document.body.removeChild(ta);}
if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(function(){copyBtn.textContent=“コピーしました”;setTimeout(function(){copyBtn.textContent=“レポートをコピー”;},1500);}).catch(function(){fallback();});}else{fallback();}
});
rc.appendChild(copyBtn);
wrap.appendChild(rc);
root.appendChild(wrap);
}

load();
render();
</script>
