<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>攻殻機動隊 実戦メモ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#07070f;color:#dde;font-family:'Courier New',monospace;padding-bottom:80px;}
button{-webkit-appearance:none;outline:none;cursor:pointer;font-family:'Courier New',monospace;}
input,textarea{-webkit-appearance:none;outline:none;font-family:'Courier New',monospace;}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ===================== 定数 =====================
const SK="kokaku_v10";
const KIREI_ZONES=[50,100,150,200,250,300,350,400,450,550];
const ZONE_COLORS=["🟩","🟨","🟥","🟦","🟪","🌈","🥇"];
const SEN_COLORS=["🟩","🟥","🟦","🟪","🌈","🥇"];
const CZ_LEVELS=["🟦","🟩","🟥","🌈"];
const RARE_ROLES=["なし","🔴チェリー","🟢スイカ","🎰強役"];
const TACHI=[
  {k:"⚪️",h:"平均35pt"},{k:"🔵",h:"平均50pt"},
  {k:"🟢",h:"50pt以上・平均85pt"},{k:"🔴",h:"100pt以上・平均130pt"},
];
const MINFO={
  A:{c:"#6c757d",d:"天井550G",ceil:550},B:{c:"#0d6efd",d:"天井450G",ceil:450},
  C:{c:"#fd7e14",d:"天井250G★",ceil:250},D:{c:"#dc3545",d:"天井150G★★",ceil:150},
};
const ZTABLE={
  50:{A:"25%",B:"50%",C:"25%",D:"100%"},100:{A:"50%",B:"1%",C:"50%",D:"1%"},
  150:{A:"1%",B:"50%",C:"1%",D:"天井"},200:{A:"家出",B:"家出",C:"家出",D:"-"},
  250:{A:"50%",B:"25%",C:"天井",D:"-"},300:{A:"-",B:"1%",C:"-",D:"-"},
  350:{A:"25%",B:"50%",C:"-",D:"-"},400:{A:"家出",B:"家出",C:"-",D:"-"},
  450:{A:"50%",B:"天井",C:"-",D:"-"},550:{A:"天井",B:"-",C:"-",D:"-"},
};
const ICHI=[
  {k:"素子",h:"デフォルト",c:"#555"},{k:"戦闘中素子",h:"高設定示唆(弱)",c:"#198754"},
  {k:"トグサ",h:"奇数設定示唆",c:"#4da8ff"},{k:"バトー",h:"偶数設定示唆",c:"#4da8ff"},
  {k:"ポーカー",h:"高モード示唆",c:"#0dcaf0"},{k:"素子後ろ姿",h:"モードB以上濃厚",c:"#ffc107"},
  {k:"公安9課",h:"モードC以上濃厚",c:"#fd7e14"},{k:"電脳素子",h:"モードC以上+D期待",c:"#a855f7"},
  {k:"アオイ",h:"モードD+設定4以上",c:"#fbbf24"},{k:"2ndGIG",h:"白の境界 権利保有",c:"#22d3ee"},
];
const FRAMES=[{k:"なし",c:"#444"},{k:"🔴赤枠",c:"#dc3545"},{k:"🟣紫枠",c:"#a855f7"},{k:"🥇金枠",c:"#ffc107"}];
const TROPHIES=[
  {k:"なし",l:"なし",c:"#444"},{k:"銅",l:"🥉銅(設定2以上)",c:"#cd7f32"},
  {k:"銀",l:"🥈銀(設定3以上)",c:"#adb5bd"},{k:"金",l:"🥇金(設定4以上)",c:"#ffc107"},
  {k:"キリン",l:"🦒キリン(設定5以上)",c:"#fd7e14"},{k:"虹",l:"🌈虹(設定6確定)",c:"#0dcaf0"},
];
const SAM=[
  {k:"①",h:"デフォルト"},{k:"②",h:"復活期待50%"},{k:"③",h:"調査中"},
  {k:"④",h:"偶数↑"},{k:"⑤",h:"高設定弱"},{k:"⑥",h:"高設定強"},
  {k:"⑦",h:"調査中"},{k:"⑧",h:"設定2以上"},{k:"⑨",h:"設定4以上"},{k:"⑩",h:"設定6濃厚"},
];
const TBL=["①","②","③","④","⑤","⑥","⑦"];
const CYC=["①","②","③","④","⑤","⑥","⑦","⑧"];
const GRN="#00ff99",BG="#07070f",MUT="#556",FONT="'Courier New',monospace";

// ===================== データ =====================
let _id=0;
const uid=()=>`${++_id}_${Date.now()}`;
function newAT(n){return{n,cycles:[newCyc()],mai:null,bmai:null,ichi:null,frame:“なし”,sam:null,trophy:“なし”,tachi:null,hakky:null,note:””};}
function newCyc(){
const kirei={};KIREI_ZONES.forEach(g=>kirei[g]={col:null,hat:null});
return{id:uid(),naibu:“通常”,conf:[],deny:[],tachi:null,kirei,sen:[],cz:null};
}
function newSen(g,tr){return{id:uid(),g,tr,tbl:null,col:null,ok:null,memo:””};}
function newCZ(g,type){return{id:uid(),g,type,lv:null,rare:“なし”,ok:null,fuk:null,sam:null};}

// ===================== STATE =====================
const S={
scr:“home”,ats:[],curAT:null,curCyc:0,
totalG:””,totalMai:””,
senG:null,senTr:“規定G”,czG:null,
openSec:null,openSen:null,
};
function save(){try{localStorage.setItem(SK,JSON.stringify({ats:S.ats,totalG:S.totalG,totalMai:S.totalMai}));}catch(e){}}
function load(){try{const d=JSON.parse(localStorage.getItem(SK)||”{}”);if(Array.isArray(d.ats))S.ats=d.ats;if(d.totalG)S.totalG=d.totalG;if(d.totalMai)S.totalMai=d.totalMai;}catch(e){}}
function getAT(){return S.curAT!==null?S.ats[S.curAT]:null;}
function getCyc(){const a=getAT();return a?a.cycles[S.curCyc]:null;}
function updAT(fn){const i=S.curAT;S.ats[i]=fn(S.ats[i]);save();}
function updCyc(fn){
const a=getAT();if(!a)return;
const cs=[…a.cycles];cs[S.curCyc]=fn(cs[S.curCyc]);
S.ats[S.curAT]={…a,cycles:cs};save();
}
function updSen(si,k,v){updCyc(c=>{const s=[…c.sen];s[si]={…s[si],[k]:v};return{…c,sen:s};});}
function updCZ(k,v){updCyc(c=>({…c,cz:{…c.cz,[k]:v}}));}
function modeState(m){const c=getCyc();if(!c)return”off”;return c.conf.includes(m)?“on”:c.deny.includes(m)?“deny”:“off”;}
function cycleMode(m){
updCyc(c=>{
if(!c.conf.includes(m)&&!c.deny.includes(m))return{…c,conf:[…c.conf,m]};
if(c.conf.includes(m))return{…c,conf:c.conf.filter(x=>x!==m),deny:[…c.deny,m]};
return{…c,deny:c.deny.filter(x=>x!==m)};
});
}

// ===================== HTML helpers =====================
const css=(styles)=>Object.entries(styles).map(([k,v])=>`${k.replace(/([A-Z])/g,'-$1').toLowerCase()}:${v}`).join(’;’);

function h(tag,attrs,inner){
const e=document.createElement(tag);
if(attrs){
Object.entries(attrs).forEach(([k,v])=>{
if(k===‘style’&&typeof v===‘object’)e.setAttribute(‘style’,css(v));
else if(k===‘className’)e.className=v;
else if(k===‘onClick’)e.addEventListener(‘click’,v);
else if(k===‘onInput’)e.addEventListener(‘input’,v);
else if(k===‘placeholder’)e.placeholder=v;
else if(k===‘value’)e.value=v;
else if(k===‘title’)e.title=v;
else e.setAttribute(k,v);
});
}
if(inner!==undefined&&inner!==null){
if(Array.isArray(inner)){
inner.forEach(c=>{if(c!=null&&c!==false){typeof c===‘string’?e.appendChild(document.createTextNode(c)):e.appendChild(c);}});
} else if(typeof inner===‘string’){
e.textContent=inner;
} else {
e.appendChild(inner);
}
}
return e;
}
function D(s,c){return h(‘div’,{style:s},c);}
function B(s,c,fn){const e=h(‘button’,{style:s},c);if(fn)e.addEventListener(‘click’,fn);return e;}
function SP(s,c){return h(‘span’,{style:s},c);}

const cardS={background:’#0e0e1a’,border:‘1px solid #222235’,borderRadius:‘10px’,padding:‘10px 12px’,marginBottom:‘8px’};
const secS={fontSize:‘9px’,color:GRN,letterSpacing:‘3px’,textTransform:‘uppercase’,marginBottom:‘6px’,fontWeight:‘700’,display:‘block’};
const rowS={display:‘flex’,gap:‘4px’,flexWrap:‘wrap’,marginBottom:‘4px’};

function tag(text,color,sm){
return SP({display:‘inline-block’,background:color+‘22’,border:`1px solid ${color}44`,color,borderRadius:‘3px’,padding:sm?‘1px 4px’:‘2px 6px’,fontSize:sm?‘10px’:‘11px’,margin:‘1px’},text);
}
function mkBtn(label,active,color,fn,sm){
return B({background:active?color+‘33’:‘transparent’,color:active?color:color+‘88’,border:`1px solid ${active?color:color+'33'}`,borderRadius:‘5px’,padding:sm?‘3px 8px’:‘5px 11px’,fontSize:sm?‘11px’:‘12px’,fontWeight:active?‘700’:‘400’},label,fn);
}

// カスタム確認ダイアログ
function showConfirm(msg,onOk){
const ov=D({position:‘fixed’,top:‘0’,left:‘0’,right:‘0’,bottom:‘0’,background:’#000000aa’,zIndex:‘300’,display:‘flex’,alignItems:‘center’,justifyContent:‘center’});
const box=D({background:’#0e0e1a’,border:‘1px solid #444’,borderRadius:‘12px’,padding:‘20px 16px’,margin:‘0 20px’,maxWidth:‘320px’,width:‘100%’});
box.appendChild(D({color:’#dde’,fontSize:‘14px’,marginBottom:‘16px’,lineHeight:‘1.6’},msg));
const btns=D({display:‘grid’,gridTemplateColumns:‘1fr 1fr’,gap:‘8px’});
btns.appendChild(B({background:‘transparent’,color:’#aaa’,border:‘1px solid #444’,borderRadius:‘8px’,padding:‘11px’,fontSize:‘14px’},‘キャンセル’,()=>ov.remove()));
btns.appendChild(B({background:’#dc3545’,color:’#fff’,border:‘none’,borderRadius:‘8px’,padding:‘11px’,fontSize:‘14px’,fontWeight:‘700’},‘リセット’,()=>{ov.remove();onOk();}));
box.appendChild(btns);
ov.appendChild(box);
ov.addEventListener(‘click’,e=>{if(e.target===ov)ov.remove();});
document.body.appendChild(ov);
}

// テンキー
function showNumpad(label,curVal,onDone){
let v=String(curVal||’’);
const disp=SP({color:GRN,fontSize:‘22px’,fontWeight:‘700’,minWidth:‘60px’,textAlign:‘right’},v||’—’);
const pad=D({position:‘fixed’,bottom:‘0’,left:‘0’,right:‘0’,background:’#0a0a18’,borderTop:`2px solid ${GRN}44`,zIndex:‘200’,padding:‘10px 12px 24px’});
pad.appendChild(D({display:‘flex’,alignItems:‘center’,justifyContent:‘space-between’,marginBottom:‘8px’},[SP({color:MUT,fontSize:‘11px’},label),disp]));
const grid=D({display:‘grid’,gridTemplateColumns:‘repeat(3,1fr)’,gap:‘6px’,marginBottom:‘8px’});
[‘7’,‘8’,‘9’,‘4’,‘5’,‘6’,‘1’,‘2’,‘3’,‘C’,‘0’,‘⌫’].forEach(k=>{
const isSpec=k===‘⌫’||k===‘C’;
grid.appendChild(B({background:isSpec?’#1a1a2a’:’#111122’,color:k===‘⌫’?’#ff6666’:k===‘C’?’#ff9944’:GRN,border:`1px solid ${isSpec?'#333':'#1e1e3a'}`,borderRadius:‘8px’,padding:‘14px 0’,fontSize:‘18px’,fontWeight:‘700’},k,()=>{
if(k===‘⌫’)v=v.slice(0,-1);
else if(k===‘C’)v=’’;
else if(v.length<4)v+=k;
disp.textContent=v||’—’;
}));
});
pad.appendChild(grid);
const btns=D({display:‘grid’,gridTemplateColumns:‘1fr 1fr’,gap:‘8px’});
btns.appendChild(B({background:‘transparent’,color:’#556’,border:‘1px solid #333’,borderRadius:‘8px’,padding:‘12px’,fontSize:‘14px’},‘キャンセル’,()=>{pad.remove();}));
btns.appendChild(B({background:GRN,color:BG,border:‘none’,borderRadius:‘8px’,padding:‘12px’,fontSize:‘14px’,fontWeight:‘700’},‘確定’,()=>{onDone(v?parseInt(v):null);pad.remove();render();}));
pad.appendChild(btns);
document.body.appendChild(pad);
}

function gBtn(val,placeholder,label,onChange){
return B({background:’#16162a’,border:`1px solid ${val?'#444':'#222235'}`,borderRadius:‘7px’,color:val?GRN:’#445’,padding:‘8px 12px’,fontSize:val?‘16px’:‘13px’,fontWeight:val?‘700’:‘400’,textAlign:‘left’,flex:‘1’},val?`${val}G`:(placeholder||‘G数入力’),()=>showNumpad(label||‘G数’,val,v=>{onChange(v);}));
}

function section(id,label,color,badge,makeFn){
const isOpen=S.openSec===id;
const hdr=B({background:isOpen?color+‘18’:‘transparent’,color:isOpen?color:color+‘66’,border:`1px solid ${isOpen?color+'44':'#222'}`,borderRadius:isOpen?‘7px 7px 0 0’:‘7px’,padding:‘7px 12px’,fontSize:‘12px’,fontWeight:‘700’,width:‘100%’,textAlign:‘left’,display:‘flex’,alignItems:‘center’,justifyContent:‘space-between’,marginBottom:isOpen?‘0’:‘2px’},null,()=>{S.openSec=S.openSec===id?null:id;render();});
hdr.appendChild(SP({},`${isOpen?'▼ ':'▶ '}${label}`));
if(badge)hdr.appendChild(SP({fontSize:‘10px’,opacity:‘0.7’},badge));
const wrap=D({marginBottom:‘6px’},[hdr]);
if(isOpen){
const body=D({background:’#16162a’,border:‘1px solid #222’,borderTop:‘none’,borderRadius:‘0 0 7px 7px’,padding:‘10px 10px 8px’});
makeFn().forEach(c=>{if(c)body.appendChild(c);});
wrap.appendChild(body);
}
return wrap;
}

// ===================== レポート =====================
function buildReport(){
const lines=[“☆スマスロ攻殻機動隊 実戦まとめ”,`総G数:${S.totalG}G / 差枚:${S.totalMai}枚`,””];
S.ats.forEach(a=>{
const prev=S.ats[a.n-2];
lines.push(`AT${a.n}${prev&&prev.tachi?' ↩看板'+prev.tachi:''}`);
a.cycles.forEach((c,ci)=>{
const cn=CYC[ci]||String(ci+1);
lines.push(`${cn}${c.naibu}${c.conf.length?' 確:'+c.conf.join(''):''}${c.deny.length?' 否:'+c.deny.join(''):''}${c.tachi?' 看板'+c.tachi:''}`);
const kp=[];KIREI_ZONES.forEach(g=>{const k=c.kirei[g];if(k.col||k.hat!==null)kp.push(`${g}${k.col||''}${k.hat===true?'〇':k.hat===false?'-':''}`)});
if(kp.length)lines.push(` [${kp.join(' ')}]`);
c.sen.forEach(s=>{lines.push(` (${s.g}G 殲滅${s.tr==='ポイント'?'P':''}${s.tbl?' '+s.tbl:''}${s.col||''}${s.ok===true?'〇':s.ok===false?'×':'?'}${s.memo?' '+s.memo:''})`);});
if(c.cz){const cz=c.cz;lines.push(` ${cz.g}G CZ[${cz.type}] ${cz.lv||'?'}${cz.rare!=='なし'?' '+cz.rare:''}${cz.ok===true?'〇':cz.ok===false?'×':'?'}${cz.fuk===true?' 復活〇':cz.fuk===false?' 復活×':''}${cz.sam?' 画面'+cz.sam:''}`);}
});
lines.push(` ↓${a.mai?a.mai+'枚':''}${a.bmai?' (+'+a.bmai+')':''}${a.ichi?' '+a.ichi+(a.frame!=='なし'?a.frame:''):''}${a.sam?' 画面'+a.sam:''}${a.trophy!=='なし'?' '+a.trophy:''}${a.hakky?' 白の境界Lv'+a.hakky:''}${a.tachi?' '+a.tachi:''}`);
if(a.note)lines.push(` ${a.note}`);
lines.push(’’);
});
return lines.join(’\n’);
}

// ===================== RENDER =====================
function render(){
const app=document.getElementById(‘app’);
while(app.firstChild)app.removeChild(app.firstChild);
if(S.scr===‘home’)renderHome(app);
else if(S.scr===‘record’)renderRecord(app);
else if(S.scr===‘summary’)renderSummary(app);
}

// –– HOME ––
function renderHome(app){
// ヘッダー
const hdr=D({background:’#0e0e1a’,borderBottom:`1px solid ${GRN}22`,padding:‘8px 12px’,display:‘flex’,alignItems:‘center’,justifyContent:‘space-between’,position:‘sticky’,top:‘0’,zIndex:‘100’});
hdr.appendChild(SP({color:GRN,fontSize:‘12px’,fontWeight:‘700’,letterSpacing:‘3px’},‘⚡ 攻殻機動隊’));
hdr.appendChild(tag(`${S.ats.length}AT`,GRN,true));
app.appendChild(hdr);

const wrap=D({padding:‘10px 12px’});

// セッション
const sc=D(cardS);
sc.appendChild(SP(secS,‘セッション’));
const stats=D({display:‘flex’,gap:‘8px’,marginBottom:‘10px’});
[{v:S.ats.length,l:‘AT’,c:GRN},{v:S.ats.reduce((a,r)=>a+r.cycles.reduce((b,c)=>b+c.sen.length,0),0),l:‘殲滅’,c:’#ffc107’},{v:S.ats.filter(r=>r.trophy!==‘なし’).length,l:‘トロフィー’,c:’#a855f7’}].forEach(({v,l,c})=>{
const box=D({flex:‘1’,textAlign:‘center’});
box.appendChild(D({fontSize:‘24px’,fontWeight:‘700’,color:c},String(v)));
box.appendChild(D({fontSize:‘9px’,color:MUT,letterSpacing:‘1px’},l));
stats.appendChild(box);
});
sc.appendChild(stats);
const gRow=D({display:‘flex’,gap:‘6px’});
[{v:S.totalG,p:‘総G数’,k:‘totalG’},{v:S.totalMai,p:‘総差枚’,k:‘totalMai’}].forEach(({v,p,k})=>{
const box=D({flex:‘1’});
box.appendChild(SP({fontSize:‘10px’,color:MUT,marginBottom:‘2px’,display:‘block’},p));
box.appendChild(gBtn(v?parseInt(v):null,p,p,val=>{S[k]=val?String(val):’’;save();}));
gRow.appendChild(box);
});
sc.appendChild(gRow);
wrap.appendChild(sc);

// AT一覧
S.ats.forEach((a,i)=>{
const prev=S.ats[i-1];
const inheritTachi=prev?prev.tachi:null;
const ichiInfo=ICHI.find(e=>e.k===a.ichi);
const trInfo=TROPHIES.find(t=>t.k===a.trophy);
const card=D({…cardS,cursor:‘pointer’,borderColor:S.curAT===i?GRN+‘44’:’#222235’});
card.addEventListener(‘click’,()=>{S.curAT=i;S.curCyc=a.cycles.length-1;S.scr=‘record’;S.openSec=null;S.openSen=null;render();});
const top=D({display:‘flex’,alignItems:‘center’,gap:‘6px’,marginBottom:‘4px’});
top.appendChild(SP({color:GRN,fontWeight:‘700’,fontSize:‘14px’},`AT${a.n}`));
if(inheritTachi)top.appendChild(tag(‘↩’+inheritTachi,’#0dcaf0’,true));
if(a.mai){const ms=SP({color:’#0dcaf0’,fontWeight:‘700’,marginLeft:‘auto’},`${a.mai}枚${a.bmai?' (+'+a.bmai+')':''}`);top.appendChild(ms);}
if(a.trophy!==‘なし’&&trInfo)top.appendChild(tag(a.trophy,trInfo.c,true));
card.appendChild(top);
const cycDiv=D({fontSize:‘10px’,color:’#556’,lineHeight:‘1.9’});
a.cycles.forEach((c,ci)=>{
const czOk=c.cz?c.cz.ok:null;
const row=D({paddingLeft:‘4px’,borderLeft:`2px solid ${czOk===true?'#00ff9944':czOk===false?'#ff444433':'#333'}`});
row.appendChild(SP({color:’#667’},CYC[ci]||String(ci+1)));
row.appendChild(SP({color:c.naibu===‘超高確’?’#fd7e14’:c.naibu===‘高確’?’#0dcaf0’:’#445’,marginLeft:‘3px’,fontSize:‘9px’},c.naibu));
if(c.tachi)row.appendChild(SP({marginLeft:‘3px’,fontSize:‘11px’},c.tachi));
c.conf.forEach(m=>row.appendChild(SP({color:MINFO[m].c,marginLeft:‘3px’,fontSize:‘9px’},`確${m}`)));
c.sen.forEach(s=>row.appendChild(SP({marginLeft:‘4px’},`${s.g}G${s.col||''}${s.ok===true?'〇':s.ok===false?'×':''}`)));
if(c.cz)row.appendChild(SP({marginLeft:‘4px’},`CZ${c.cz.lv||''}${c.cz.ok===true?'〇':c.cz.ok===false?'×':''}`));
cycDiv.appendChild(row);
});
card.appendChild(cycDiv);
if(a.ichi&&ichiInfo)card.appendChild(D({marginTop:‘4px’},[tag(a.ichi,ichiInfo.c,true)]));
wrap.appendChild(card);
});

wrap.appendChild(B({background:GRN,color:BG,border:‘none’,borderRadius:‘9px’,padding:‘12px’,fontSize:‘14px’,fontWeight:‘700’,width:‘100%’,marginBottom:‘6px’},‘＋ 新しいATを開始’,()=>{
const idx=S.ats.length;S.ats.push(newAT(idx+1));S.curAT=idx;S.curCyc=0;S.scr=‘record’;S.openSec=null;S.openSen=null;save();render();
}));
wrap.appendChild(B({background:‘transparent’,color:’#aaa’,border:‘1px solid #333’,borderRadius:‘9px’,padding:‘12px’,fontSize:‘14px’,fontWeight:‘700’,width:‘100%’,marginBottom:‘6px’},‘📈 設定判別サマリー’,()=>{S.scr=‘summary’;render();}));
wrap.appendChild(B({background:‘transparent’,color:’#dc3545’,border:‘1px solid #dc354533’,borderRadius:‘9px’,padding:‘12px’,fontSize:‘14px’,fontWeight:‘700’,width:‘100%’,marginBottom:‘6px’},‘🗑️ リセット’,()=>{
showConfirm(‘全データをリセットしますか？’,()=>{S.ats=[];S.totalG=’’;S.totalMai=’’;try{localStorage.removeItem(SK);}catch(e){}render();});
}));

// カンペ
const kp=D({…cardS,marginTop:‘8px’});
kp.appendChild(SP(secS,‘一枚絵カンペ’));
ICHI.filter(e=>e.c!==’#555’).forEach(e=>{
const row=D({display:‘flex’,alignItems:‘center’,gap:‘6px’,marginBottom:‘4px’});
row.appendChild(tag(e.k,e.c,true));
row.appendChild(SP({fontSize:‘11px’,color:’#aaa’},`→ ${e.h}`));
kp.appendChild(row);

const ta=h(‘textarea’,{style:{background:’#070710’,border:‘1px solid #333’,borderRadius:‘6px’,color:’#bbb’,padding:‘6px 8px’,fontSize:‘12px’,width:‘100%’,minHeight:‘50px’,resize:‘vertical’,marginTop:‘8px’},placeholder:‘s9m / 白の境界詳細 / その他’});
ta.value=at.note||’’;ta.addEventListener(‘input’,e=>updAT(a=>({…a,note:e.target.value})));items.push(ta);
return items;
}));

const bRow=D({display:‘flex’,gap:‘6px’,marginTop:‘8px’});
bRow.appendChild(B({flex:‘1’,background:‘transparent’,color:’#ff6666’,border:‘1px solid #dc354544’,borderRadius:‘9px’,padding:‘12px’,fontSize:‘14px’,fontWeight:‘700’},‘❌ CZ失敗→次周期’,()=>{
updCyc(c=>({…c,cz:c.cz?{…c.cz,ok:false}:c.cz}));
const a=getAT();S.ats[S.curAT]={…a,cycles:[…a.cycles,newCyc()]};S.curCyc++;S.senG=null;S.czG=null;S.openSec=null;S.openSen=null;save();render();
}));
bRow.appendChild(B({flex:‘1’,background:‘transparent’,color:’#aaa’,border:‘1px solid #333’,borderRadius:‘9px’,padding:‘12px’,fontSize:‘14px’,fontWeight:‘700’},‘＋ 次のAT’,()=>{
const idx=S.ats.length;S.ats.push(newAT(idx+1));S.curAT=idx;S.curCyc=0;S.scr=‘record’;S.openSec=null;S.openSen=null;save();render();
}));
wrap.appendChild(bRow);
wrap.appendChild(B({background:GRN,color:BG,border:‘none’,borderRadius:‘9px’,padding:‘12px’,fontSize:‘14px’,fontWeight:‘700’,width:‘100%’,marginTop:‘6px’},‘← ホームへ’,()=>{S.scr=‘home’;render();}));
app.appendChild(wrap);
}

// –– SUMMARY ––
function renderSummary(app){
const ats=S.ats;
const imeC={},trC={};let czOk=0,czNg=0,fukOk=0,fukNg=0;
ats.forEach(a=>{
if(a.ichi)imeC[a.ichi]=(imeC[a.ichi]||0)+1;
trC[a.trophy]=(trC[a.trophy]||0)+1;
a.cycles.forEach(c=>{if(c.cz){if(c.cz.ok===true)czOk++;if(c.cz.ok===false){czNg++;if(c.cz.fuk===true)fukOk++;if(c.cz.fuk===false)fukNg++;}}});
});
const hdr=D({background:’#0e0e1a’,borderBottom:`1px solid ${GRN}22`,padding:‘8px 12px’,display:‘flex’,alignItems:‘center’,justifyContent:‘space-between’,position:‘sticky’,top:‘0’,zIndex:‘100’});
hdr.appendChild(B({background:‘none’,border:‘none’,color:GRN,fontSize:‘18px’,padding:‘0 4px’},‘←’,()=>{S.scr=‘home’;render();}));
hdr.appendChild(SP({color:GRN,fontWeight:‘700’,fontSize:‘12px’,letterSpacing:‘2px’},‘設定判別サマリー’));
hdr.appendChild(tag(`AT${ats.length}`,GRN,true));
app.appendChild(hdr);
const wrap=D({padding:‘10px 12px’});
// CZ成績
const cs=D(cardS);cs.appendChild(SP(secS,‘CZ成績’));
const czRow=D({display:‘flex’,gap:‘16px’,fontSize:‘18px’,fontWeight:‘700’,marginBottom:‘4px’});
czRow.appendChild(SP({color:’#00ff99’},`✅ ${czOk}回`));czRow.appendChild(SP({color:’#ff4444’},`❌ ${czNg}回`));
if((czOk+czNg)>0)czRow.appendChild(SP({color:MUT,fontSize:‘13px’,fontWeight:‘400’},`成功率${Math.round(czOk/(czOk+czNg)*100)}%`));
cs.appendChild(czRow);
if((fukOk+fukNg)>0){const fr=D({fontSize:‘12px’,color:’#aaa’});fr.appendChild(SP({color:’#00ff99’},`復活${fukOk}〇`));fr.appendChild(SP({},’ / ‘));fr.appendChild(SP({color:’#ff4444’},`${fukNg}×`));fr.appendChild(SP({color:MUT},` (${Math.round(fukOk/(fukOk+fukNg)*100)}%)`));cs.appendChild(fr);}
wrap.appendChild(cs);
// 一枚絵
const ic=D(cardS);ic.appendChild(SP(secS,‘一枚絵分布’));
if(!Object.keys(imeC).length){ic.appendChild(D({color:MUT,fontSize:‘11px’},‘記録なし’));}
else{Object.entries(imeC).forEach(([k,cnt])=>{const info=ICHI.find(e=>e.k===k)||{c:’#888’};const row=D({display:‘flex’,alignItems:‘center’,gap:‘8px’,marginBottom:‘5px’});row.appendChild(SP({minWidth:‘78px’,fontSize:‘11px’,color:info.c,fontWeight:‘700’},k));const bar=D({flex:‘1’,background:’#1a1a2a’,borderRadius:‘3px’,height:‘6px’});const fill=D({background:info.c,width:`${cnt/ats.length*100}%`,height:‘100%’,borderRadius:‘3px’});bar.appendChild(fill);row.appendChild(bar);row.appendChild(SP({color:’#aaa’,fontSize:‘11px’,minWidth:‘36px’},`${cnt}/${ats.length}`));ic.appendChild(row);});}
wrap.appendChild(ic);
// トロフィー
const tc=D(cardS);tc.appendChild(SP(secS,‘トロフィー’));
const validTr=Object.entries(trC).filter(([k])=>k!==‘なし’);
if(!validTr.length){tc.appendChild(D({color:MUT,fontSize:‘11px’},‘なし’));}
else{validTr.forEach(([k,cnt])=>{const t=TROPHIES.find(t=>t.k===k);tc.appendChild(D({marginBottom:‘4px’},[tag(`${t?t.l:k} ×${cnt}`,t?t.c:’#888’,false)]));}); }
wrap.appendChild(tc);
// 設定推測
const sc2=D(cardS);sc2.appendChild(SP(secS,‘設定推測’));
const hints=[];
if((trC[‘虹’]||0)>0)hints.push({c:’#0dcaf0’,t:‘🌈虹 → 設定6確定！’});
if((trC[‘キリン’]||0)>0)hints.push({c:’#fd7e14’,t:‘🦒キリン → 設定5以上確定’});
if((trC[‘金’]||0)>=2)hints.push({c:’#ffc107’,t:`🥇金×${trC['金']} → 設定4以上濃厚`});
if((imeC[‘アオイ’]||0)>0)hints.push({c:’#fbbf24’,t:`アオイ${imeC['アオイ']}回 → モードD+設定4以上`});
if(!hints.length)hints.push({c:’#334’,t:‘サンプル不足。記録を続けましょう。’});
hints.forEach(x=>sc2.appendChild(D({fontSize:‘12px’,color:x.c,marginBottom:‘5px’},`• ${x.t}`)));
wrap.appendChild(sc2);
// レポート
const rc=D(cardS);rc.appendChild(SP(secS,‘実戦レポート’));
const pre=h(‘pre’,{style:{background:’#050508’,border:‘1px solid #222235’,borderRadius:‘7px’,padding:‘10px’,fontSize:‘10px’,color:’#0f0’,whiteSpace:‘pre-wrap’,lineHeight:‘1.8’,maxHeight:‘320px’,overflow:‘auto’,margin:‘0’}});
pre.textContent=buildReport();rc.appendChild(pre);
const copyBtn=B({background:‘transparent’,color:GRN,border:`1px solid ${GRN}44`,borderRadius:‘7px’,padding:‘8px 12px’,fontSize:‘12px’,fontWeight:‘700’,width:‘100%’,marginTop:‘6px’},‘📋 レポートをコピー’,()=>{
const text=buildReport();
function fallback(){const ta=document.createElement(‘textarea’);ta.value=text;ta.style.position=‘fixed’;ta.style.opacity=‘0’;document.body.appendChild(ta);ta.select();ta.setSelectionRange(0,99999);try{document.execCommand(‘copy’);copyBtn.textContent=‘✅ コピーしました’;setTimeout(()=>{copyBtn.textContent=‘📋 レポートをコピー’;},1500);}catch(e){copyBtn.textContent=‘❌ 失敗’;}document.body.removeChild(ta);}
if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(()=>{copyBtn.textContent=‘✅ コピーしました’;setTimeout(()=>{copyBtn.textContent=‘📋 レポートをコピー’;},1500);}).catch(()=>fallback());}else{fallback();}
});
rc.appendChild(copyBtn);
wrap.appendChild(rc);
app.appendChild(wrap);
}

load();
render();
</script>

</body>
</html>
